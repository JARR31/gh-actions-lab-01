services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pulsecart
      POSTGRES_PASSWORD: pulsecart
      POSTGRES_DB: pulsecart
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsecart -d pulsecart"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pulsecart-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: pulsecart-api:local
    environment:
      NODE_ENV: development
      API_PORT: 3000
      STORAGE_DRIVER: postgres
      DATABASE_URL: postgres://pulsecart:pulsecart@postgres:5432/pulsecart
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000
    image: pulsecart-web:local
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pulsecart-postgres:
