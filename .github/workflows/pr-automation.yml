name: "PR Automation"

run-name: "#${{ github.event.pull_request.number }} | Run ${{ github.workflow }}  - commit: ${{ github.sha }} - @${{ github.actor }}"

on: 
    pull_request:
        types:
            - opened
            - edited
            - synchronize
            - ready_for_review
            - reopened
        branches:
            - main

# concurrency:

defaults:
    run:
        shell: bash

permissions:
    contents: read

jobs:
    check-pr-meta:
        runs-on: ubuntu-24.04
        timeout-minutes: 7
        steps:
            - name: Check Title Format
              id: check-title-format
              timeout-minutes: 1
              env:
                PR_TITLE: ${{ github.event.pull_request.title }}
              run: |
                python3 -c '
                import os, re, sys

                PR_TITLE = (os.getenv("PR_TITLE") or "").strip()
                PATTERN  = r"^(feat|fix|docs|test|refactor|ci|chore|build|perf|security)(\([a-z0-9-]+\))?: .+"

                if PR_TITLE == "":
                    print("The PR Title is empty.")
                    sys.exit(1)

                if not re.match(PATTERN, PR_TITLE):
                    print("The PR Titlte does not match the expected pattern: \"{}\"".format(PATTERN))
                    sys.exit(1)

                print("PR Titlte Validation Passed.")
                sys.exit(0)
                ';

            - name: Check Body Format
              id: check-body-format
              timeout-minutes: 1
              env:
                PR_BODY: ${{ github.event.pull_request.body }}
              run: |
                python3 -c '
                import os, re, sys

                SECTIONS = [
                    "## Problem Statement",
                    "## Test Evidence",
                    "## Rollback Notes",
                ]

                PR_BODY = (os.getenv("PR_BODY") or "").strip()

                if PR_BODY == "":
                    print("The PR Body is empty.")
                    sys.exit(1)

                body_list = PR_BODY.splitlines()
                errors = ""

                for section in SECTIONS:
                    if section not in body_list:
                        errors += "- Missing \"{}\" in PR Body.\n".format(section)

                if len(errors) == 0:
                    print("PR Body Validation Passed.")
                    sys.exit(0)

                print("PR Body Validation Failed:\n{}".format(errors))
                sys.exit(1)
                ';
    auto-label:
        runs-on: ubuntu-24.04
        timeout-minutes: 5
        permissions:
            contents: read
            pull-requests: write
        steps:
            - name: Checkout
              id: git-checkout
              timeout-minutes: 1
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Detect Changes
              id: detect-changes
              timeout-minutes: 1
              uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
              with:
                filters: |
                  api:
                    - 'apps/api/**'
                  web:
                    - 'apps/web/**'
                  domain:
                    - 'packages/domain/**'
                    - 'package.json'
                    - 'pnpm-lock.yaml'
                  cicd:
                    - '.github/**'

            - name: Resolve Changed Areas
              id: resolve-changed-areas
              timeout-minutes: 1
              run: |
                AREAS='{
                    "api": "${{ steps.detect-changes.outputs.api }}",
                    "web": "${{ steps.detect-changes.outputs.web }}",
                    "domain": "${{ steps.detect-changes.outputs.domain }}",
                    "cicd": "${{ steps.detect-changes.outputs.cicd }}"
                }';
                
                CHANGED="$(AREAS="${AREAS}" python3 -c '
                import os, sys, json

                AREAS = os.getenv("AREAS")

                changed_areas = []
                for area, changed in json.loads(AREAS).items():
                    if changed == "true":
                        changed_areas.append("area:{}".format(area))

                print(",".join(changed_areas))
                ')";

                echo "changed-areas=${CHANGED}" >> "$GITHUB_OUTPUT"
                
            - name: Update PR Labels
              timeout-minutes: 2
              env:
                GH_TOKEN: ${{ github.token }}
              run: |
               for area in $(echo "${{ steps.resolve-changed-areas.outputs.changed-areas }}" | tr "," "\n"); do
                    gh pr edit ${{ github.event.pull_request.number }} --add-label "${area}"
               done