name: Continuous Integration

run-name: Run ${{ github.workflow }} on ${{ github.ref_name }} - ${{ github.action }} by ${{ github.actor }}

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths:
            - apps/api/**
            - apps/web/**
            - packages/domain/**
            - .github/workflows/ci.yml
    pull_request:
        types:
            - opened
            - synchronize
        branches:
            - main
        paths:
            - apps/api/**
            - apps/web/**
            - packages/domain/**
            - .github/workflows/ci.yml

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    WORKING_DIRECTORY: ${{ github.workspace }}

jobs:
    detect-changes:
        runs-on: ubuntu-24.04
        timeout-minutes: 2
        # permissions: 
        outputs:
            api: "${{ steps.detect-changes.outputs.api }}"
            web: "${{ steps.detect-changes.outputs.web }}"
            domain: "${{ steps.detect-changes.outputs.domain }}"
            any: "${{ steps.set-changes-output.outputs.any }}"
        steps:
            - name: Checkout
              id: git-checkout
              timeout-minutes: 1
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                path: "${{ env.WORKING_DIRECTORY }}"

            - name: Detect Changes
              id: detect-changes
              uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
              with:
                working-directory: "${{ env.WORKING_DIRECTORY }}"
                filters: |
                  api:
                    - 'apps/api/**'
                    - 'packages/domain/**'
                    - 'package.json'
                    - 'pnpm-lock.yaml'
                    - '.github/workflows/ci.yml'
                  web:
                    - 'apps/web/**'
                    - 'packages/domain/**'
                    - 'package.json'
                    - 'pnpm-lock.yaml'
                    - '.github/workflows/ci.yml'
                  domain:
                    - 'packages/domain/**'
                    - 'package.json'
                    - 'pnpm-lock.yaml'
                    - '.github/workflows/ci.yml'

            - name: Set Any Changes Output
              id: set-changes-output
              timeout-minutes: 1
              shell: bash
              run: |
                if [[ "${{ steps.detect-changes.outputs.api }}" == "true" || "${{ steps.detect-changes.outputs.web }}" == "true" || "${{ steps.detect-changes.outputs.domain }}" == "true" ]]; then
                    echo "any=true" >> "$GITHUB_OUTPUT"
                else
                    echo "any=false" >> "$GITHUB_OUTPUT"
                fi

    api-linters:
        needs: detect-changes
        if: needs.detect-changes.outputs.any == 'true'
        uses: ./.github/workflows/reusable-node-checks.yml
        with:
            folder: "${{ github.workspace }}/apps/api"
            step-title: "Run API Linters"
            command: "lint"

    web-linters:
        needs: detect-changes
        if: needs.detect-changes.outputs.web == 'true'
        uses: ./.github/workflows/reusable-node-checks.yml
        with:
            folder: "${{ github.workspace }}/apps/web"
            step-title: "Run Web Linters"
            command: "lint"

    domain-linters:
        needs: detect-changes
        if: needs.detect-changes.outputs.domain == 'true'
        uses: ./.github/workflows/reusable-node-checks.yml
        with:
            folder: "${{ github.workflow }}/packages/domain"
            step-title: "Run Domain linters"
            command: "lint"