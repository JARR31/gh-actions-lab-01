name: Continuous Integration
run-name: Run ${{ github.workflow }} on ${{ github.ref_name }} - ${{ github.action }} by ${{ github.actor }}
on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths:
            - apps/api/**
            - apps/web/**
            - packages/domain/**
            - .github/workflows/ci.yml
    pull_request:
        types:
            - opened
            - synchronize
        branches:
            - main
        paths:
            - apps/api/**
            - apps/web/**
            - packages/domain/**
            - .github/workflows/ci.yml
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
env:
    WORKING_DIRECTORY: ${{ github.workspace }}
jobs:
    detect-changes:
        runs-on: ubuntu-24.04
        timeout-minutes: 2
        # permissions: 
        outputs:
            api: "${{ steps.detect-changes.outputs.api }}"
            web: "${{ steps.detect-changes.outputs.web }}"
            domain: "${{ steps.detect-changes.outputs.domain }}"
            any: "${{ steps.set-changes-output.outputs.any }}"
        steps:
            - name: Checkout
              id: git-checkout
              timeout-minutes: 1
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                path: "${{ env.WORKING_DIRECTORY }}"

            - name: Detect Changes
              id: detect-changes
              uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
              with:
                working-directory: "${{ env.WORKING_DIRECTORY }}"
                filters: |
                  api:
                    - 'apps/api/**'
                    - 'packages/domain/**'
                    - 'package.json'
                    - 'pnpm-lock.yaml'
                    - '.github/workflows/ci.yml'
                  web:
                    - 'apps/web/**'
                    - 'packages/domain/**'
                    - 'package.json'
                    - 'pnpm-lock.yaml'
                    - '.github/workflows/ci.yml'
                  domain:
                    - 'packages/domain/**'
                    - 'package.json'
                    - 'pnpm-lock.yaml'
                    - '.github/workflows/ci.yml'
            - name: Set Any Changes Output
              id: set-changes-output
              timeout-minutes: 1
              shell: bash
              run: |
                if [[ "${{ steps.detect-changes.outputs.api }}" == "true" || "${{ steps.detect-changes.outputs.web }}" == "true" || "${{ steps.detect-changes.outputs.domain }}" == "true" ]]; then
                    echo "any=true" >> "$GITHUB_OUTPUT"
                else
                    echo "any=false" >> "$GITHUB_OUTPUT"
                fi
    
    lint:
        needs: detect-changes
        if: needs.detect-changes.outputs.any == 'true'
        runs-on: ubuntu-24.04
        timeout-minutes: 5
        steps:
            - name: Checkout
              id: git-checkout
              timeout-minutes: 1
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
            - name: Install NodeJS
              id: install-node
              timeout-minutes: 1
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
              with:
                node-version: 24
            - name: Install PNPM
              id: install-pnpm
              timeout-minutes: 1
              shell: bash
              working-directory: "${{ env.WORKING_DIRECTORY }}"
              run: |
                npm install --global corepack@latest
                corepack enable pnpm
                corepack use pnpm@latest-10
            - name: NPM Dependencies Caching
              id: npm-cache
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
              with:
                path: "${{ env.WORKING_DIRECTORY }}/node_modules"
                key: "${{ runner.os }}-node-modules-${{ hashFiles(format('{0}/pnpm-lock.yaml', env.WORKING_DIRECTORY)) }}"
            - name: Install NPM Dependencies
              id: install-npm-deps
              shell: bash
              working-directory: "${{ env.WORKING_DIRECTORY }}"
              run: pnpm install
            - name: API | Run Linters
              id: api-run-linters
              if: needs.detect-changes.outputs.api == 'true'
              shell: bash
              working-directory: "${{ env.WORKING_DIRECTORY }}/apps/api"
              run: pnpm lint
            - name: WEB | Run Linters
              id: web-run-linters
              if: needs.detect-changes.outputs.web == 'true'
              shell: bash
              working-directory: "${{ env.WORKING_DIRECTORY }}/apps/web"
              run: pnpm lint
            - name: DOMAIN | Run Linters
              id: domain-run-linters
              if: needs.detect-changes.outputs.domain == 'true'
              shell: bash
              working-directory: "${{ env.WORKING_DIRECTORY }}/packages/domain"
              run: pnpm lint