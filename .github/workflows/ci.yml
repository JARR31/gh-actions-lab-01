name: Continuous Integration
run-name: Run ${{ github.workflow }} on ${{ github.ref_name }} - ${{ github.action }} by ${{ github.actor }}
on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths:
            - apps/api/**
            - apps/web/**
            - packages/domain/**
            - .github/workflows/ci.yml
    pull_request:
        types:
            - opened
            - synchronize
        branches:
            - main
        paths:
            - apps/api/**
            - apps/web/**
            - packages/domain/**
            - .github/workflows/ci.yml
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
env:
    WORKING_DIRECTORY: ${{ github.workspace }}
    POSTGRES_USER: "jarr"
    POSTGRES_DB: "pulsecart"
    POSTGRES_PASSWORD: "mypassword2026"
jobs:
    detect-changes:
        runs-on: ubuntu-24.04
        timeout-minutes: 2
        outputs:
            api: "${{ steps.detect-changes.outputs.api }}"
            web: "${{ steps.detect-changes.outputs.web }}"
            domain: "${{ steps.detect-changes.outputs.domain }}"
            any: "${{ steps.set-changes-output.outputs.any }}"
        steps:
            - name: Checkout
              id: git-checkout
              timeout-minutes: 1
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                path: "${{ env.WORKING_DIRECTORY }}"

            - name: Detect Changes
              id: detect-changes
              uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
              with:
                working-directory: "${{ env.WORKING_DIRECTORY }}"
                filters: |
                  api:
                    - 'apps/api/**'
                    - 'packages/domain/**'
                    - 'package.json'
                    - 'pnpm-lock.yaml'
                    - '.github/workflows/ci.yml'
                  web:
                    - 'apps/web/**'
                    - 'packages/domain/**'
                    - 'package.json'
                    - 'pnpm-lock.yaml'
                    - '.github/workflows/ci.yml'
                  domain:
                    - 'packages/domain/**'
                    - 'package.json'
                    - 'pnpm-lock.yaml'
                    - '.github/workflows/ci.yml'

            - name: Set Any Changes Output
              id: set-changes-output
              timeout-minutes: 1
              shell: bash
              run: |
                if [[ "${{ steps.detect-changes.outputs.api }}" == "true" || "${{ steps.detect-changes.outputs.web }}" == "true" || "${{ steps.detect-changes.outputs.domain }}" == "true" ]]; then
                    echo "any=true" >> "$GITHUB_OUTPUT"
                else
                    echo "any=false" >> "$GITHUB_OUTPUT"
                fi

    api-linters:
        needs: detect-changes
        if: needs.detect-changes.outputs.api == 'true'
        uses: ./.github/workflows/reusable-node-checks.yml
        with:
            folder: "apps/api"
            step-title: "Run API Linters"
            command: pnpm lint

    api-unit-tests:
        needs: detect-changes
        if: needs.detect-changes.outputs.api == 'true'
        uses: ./.github/workflows/reusable-node-checks.yml
        with:
            folder: "apps/api"
            step-title: "Run API Unit Tests"
            command: pnpm test:unit

    api-integration-tests:
        needs: detect-changes
        if: needs.detect-changes.outputs.api == 'true'
        runs-on: ubuntu-24.04
        timeout-minutes: 5
        services:
            redis:
                image: redis@sha256:832d7785830f3f4b559300e6191fc914b15642c1935252338825cf4332200148
                ports:
                    - "6379:6379"
            postgres:
                image: postgres@sha256:bbb8851608e3ff4901156bf6a4bf90735a9d44ae014c03811bfdb2f9c354b18b
                ports:
                    - "5432:5432"
                env:
                    POSTGRES_USER: "${{ env.POSTGRES_USER }}"
                    POSTGRES_PASSWORD: "${{ env.POSTGRES_PASSWORD }}"
                    POSTGRES_DB: "${{ env.POSTGRES_DB }}"
        steps:
            - name: Checkout
              id: git-checkout
              timeout-minutes: 1
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                path: "${{ github.workspace }}"
              
            - name: Setup Node and Dependencies
              id: setup-node-deps
              timeout-minutes: 1
              uses: ./.github/actions/setup-node
              with:
                folder: "${{ github.workspace }}"

            - name: Run API Integration Tests
              shell: bash
              working-directory: "${{ github.workspace }}/apps/api"
              env:
                STORAGE_DRIVER: "postgres"
                DATABASE_URL: "postgres://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}"
                REDIS_URL: "redis://localhost:6379"
              run: pnpm test:integration

    web-linters:
        needs: detect-changes
        if: needs.detect-changes.outputs.web == 'true'
        uses: ./.github/workflows/reusable-node-checks.yml
        with:
            folder: "apps/web"
            step-title: "Run Web Linters"
            command: pnpm lint

    web-unit-tests:
        needs: detect-changes
        if: needs.detect-changes.outputs.web == 'true'
        uses: ./.github/workflows/reusable-node-checks.yml
        with:
            folder: "apps/web"
            step-title: "Run Web Unit Tests"
            command: pnpm test:unit

    web-e2e-tests:
        needs: detect-changes
        if: needs.detect-changes.outputs.web == 'true'
        uses: ./.github/workflows/reusable-node-checks.yml
        with:
            folder: "apps/web"
            step-title: "Run Web E2E Tests"
            command: |
                pnpm exec playwright install --with-deps chromium
                pnpm test:e2e

    domain-linters:
        needs: detect-changes
        if: needs.detect-changes.outputs.domain == 'true'
        uses: ./.github/workflows/reusable-node-checks.yml
        with:
            folder: "packages/domain"
            step-title: "Run Domain linters"
            command: pnpm lint

    domain-unit-tests:
        needs: detect-changes
        if: needs.detect-changes.outputs.domain == 'true'
        uses: ./.github/workflows/reusable-node-checks.yml
        with:
            folder: "packages/domain"
            step-title: "Run Domain Unit Tests"
            command: pnpm test:unit